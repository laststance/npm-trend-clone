name: E2E Tests

on:
  pull_request: ~
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Service containers for Redis + Upstash-compatible REST API
    # See: https://upstash.com/docs/redis/sdks/ts/developing
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis-http:
        image: hiett/serverless-redis-http:latest
        ports:
          - 8079:80
        env:
          SRH_MODE: env
          SRH_TOKEN: ci_test_token
          SRH_CONNECTION_STRING: redis://redis:6379

    steps:
      - uses: actions/checkout@v4

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build application
        run: pnpm build
        env:
          # Use local SRH for Redis (Upstash-compatible)
          UPSTASH_REDIS_REST_URL: http://localhost:8079
          UPSTASH_REDIS_REST_TOKEN: ci_test_token
          # Database (still using Neon for now - can be replaced with local PG later)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          # Auth
          BETTER_AUTH_SECRET: ci_test_secret_key_for_testing_only
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          APP_ENV: test
          NEXT_PUBLIC_ENABLE_MSW_MOCK: 'true'
          # Use local SRH for Redis (Upstash-compatible)
          UPSTASH_REDIS_REST_URL: http://localhost:8079
          UPSTASH_REDIS_REST_TOKEN: ci_test_token

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
