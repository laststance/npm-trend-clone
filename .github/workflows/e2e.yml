name: E2E Tests

on:
  pull_request: ~
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Service containers for PostgreSQL, Redis + Upstash-compatible REST API
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: npm_trend_clone
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis-http:
        image: hiett/serverless-redis-http:latest
        ports:
          - 8079:80
        env:
          SRH_MODE: env
          SRH_TOKEN: ci_test_token
          SRH_CONNECTION_STRING: redis://redis:6379

    steps:
      - uses: actions/checkout@v4

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          APP_ENV: test
          NEXT_PUBLIC_ENABLE_MSW_MOCK: 'true'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/npm_trend_clone
          BETTER_AUTH_SECRET: ci_test_secret_key_for_testing_only
          GITHUB_CLIENT_ID: ci_test_github_client_id
          GITHUB_CLIENT_SECRET: ci_test_github_client_secret
          RESEND_API_KEY: ''
          UPSTASH_REDIS_REST_URL: http://localhost:8079
          UPSTASH_REDIS_REST_TOKEN: ci_test_token

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
